id: function-naming-camelcase
name: "Function Naming: camelCase"
type: convention
sub_type: naming-convention
enforcement: recommended
applies_to_modules:
  - "*"
provenance: detected
created: "2026-04-15"
last_updated: "2026-04-15"

description: |
  All exported functions use camelCase naming with zero exceptions.
  79 out of 79 exported functions across 13 modules follow this pattern —
  generateCodegraph, scanModules, classifyName, resolveImportPath, etc.
  No function uses PascalCase, snake_case, or any other convention.

  An agent adding new functions must use camelCase. Functions like
  ProcessData or get_user_info would be the first deviation in an
  otherwise perfectly consistent codebase.

reference_files:
  - "src/commands/graph/index.ts"
  - "src/commands/graph/consistency.ts"
  - "src/utils/config.ts"
