id: skill-naming-conventions
name: "Skill Naming Conventions"
type: convention
sub_type: naming-convention
enforcement: recommended
applies_to_modules:
  - "templates/skills/*"
provenance: manual
created: "2026-02-13"
last_updated: "2026-02-13"

description: |
  Non-workflow skills (those not prefixed with `engraph.`) follow a `{noun}-{verb}` naming
  pattern using the verb/action form, not the noun/gerund form. This was established by the
  `context-search` skill and applies to all standalone skills.

  Examples:
    - context-search (not context-searching)
    - context-extract (not context-extraction)
    - context-verify (not context-verification)

  Workflow skills that are part of the core engraph development lifecycle retain the
  `engraph.{verb}` prefix (e.g., engraph.plan, engraph.build, engraph.complete).

examples:
  - file: ".claude/skills/"
    snippet: |
      # Correct - verb form
      context-search
      context-extract
      context-verify

      # Incorrect - noun/gerund form
      context-searching
      context-extraction
      context-verification

violations:
  - "Using noun form instead of verb form (context-extraction instead of context-extract)"
  - "Using gerund form (context-searching instead of context-search)"
  - "Prefixing non-workflow skills with engraph- (context-extract instead of context-extract)"
