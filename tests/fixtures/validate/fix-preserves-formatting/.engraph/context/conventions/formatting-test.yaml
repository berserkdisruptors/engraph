id: formatting-test
name: "Formatting Preservation Test"
type: convention
sub_type: code-convention
enforcement: recommended
applies_to_modules:
  - "auth"
  - "payments"
  - "api"
provenance: detected
created: "2026-01-15"
last_updated: "2026-03-20"

description: |
  This convention tests that validate --fix preserves YAML formatting.
  It has blank lines between top-level fields, quoted date strings,
  a multi-line description using block scalar, and an applies_to_modules
  array with three entries where "payments" is broken.

  The fix should remove only the "payments" line and leave
  everything else byte-identical.

reference_files:
  - "src/auth/index.ts"
